name: test

on:
  push:
    branches: [main]
  pull_request:

# Cancel any in-flight runs for the same ref when a new push lands. Keeps
# the queue small without losing coverage on the latest commit.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: pytest (py${{ matrix.python }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # The versions pyproject.toml says we support. If a row fails we
        # either fix it or drop the version from the support list.
        python: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip

      - name: Install package + test dependencies
        # The langchain extra is needed by tests/test_langchain_integration.py.
        # Everything else is stdlib-only.
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[langchain,dev]"

      - name: Run pytest
        run: pytest tests/ -v --tb=short
